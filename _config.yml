# ==================================
# Build settings below, DO NOT TOUCH
# ==================================

highlighter: rouge
markdown: kramdown
kramdown:
    input: GFM
    hard_wrap: false

vite:
    config_path: _src/vite.json
    viteConfig: _vite.config.mjs

plugins:
    - jekyll-relative-links
    - jekyll-sitemap
    - jekyll/fontawesome/svg
    - jekyll-minifier

jekyll-minifier:
    exclude: [ 'assets/*' ]

exclude:
    - gen_robot.sh
    - geninfo/
    - gen_desc.py
    - package.json
    - package-lock.json
    - node_modules/
    - Gemfile
    - Gemfile.lock
    - README.md
    - vendor/
    - Dockerfile*
    - LICENSE
    - build.sh
    - _node_module_patch/

